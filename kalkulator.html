<!doctype html>
<html lang=pl>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>🎒 Pakowanie — kalkulator</title>
<style>* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  font: 14px/1.45 -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  color: #16181d; margin: 0 0 70px; background: #f6f7f9;
  max-width: 100%; overflow-x: hidden;
}
header { padding: 12px 14px 4px; }
h1 { font-size: 20px; margin: 0; }
.meta { color: #777; font-size: 12px; margin-top: 2px; }

/* ---- panel filtrów ---- */
#controls {
  position: sticky; top: 0; z-index: 8; background: #fff;
  border-bottom: 1px solid #e3e6ea; padding: 10px 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
}
.ctlrow { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.fld { display: flex; flex-direction: column; font-size: 11px; color: #667;
       flex: 1 1 150px; gap: 2px; }
select, input[type=search] {
  font: inherit; padding: 7px 8px; border: 1px solid #c4c9d0; border-radius: 7px;
  background: #fff; width: 100%;
}
input[type=search] { flex: 1 1 180px; }
.tagswrap { margin-bottom: 8px; }
.lbl, .tagswrap .lbl { font-size: 11px; color: #667; margin-bottom: 3px; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-size: 12px; padding: 5px 10px; border: 1px solid #c4c9d0; border-radius: 999px;
  background: #fff; cursor: pointer; user-select: none; white-space: nowrap;
}
.chip.on { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.btn {
  font: inherit; font-size: 13px; padding: 7px 11px; border: 1px solid #c4c9d0;
  border-radius: 7px; background: #fff; cursor: pointer;
}
.btn:active { background: #eee; }
.celinfo { font-size: 12px; color: #555; margin-top: 2px; }
.celinfo b { color: #16181d; }

/* ---- wyniki ---- */
#app { padding: 12px 14px 0; }
.cats { column-gap: 14px; }
@media screen and (min-width: 820px) { .cats { column-count: 2; } }
.cat { break-inside: avoid; -webkit-column-break-inside: avoid; margin: 0 0 12px;
       background: #fff; border: 1px solid #e6e9ee; border-radius: 9px; overflow: hidden; }
.cat h3 {
  font-size: 13px; margin: 0; padding: 7px 10px; background: #eef1f5;
  display: flex; justify-content: space-between; gap: 8px;
}
.cat h3 .sub { font-weight: 700; color: #138a4e; white-space: nowrap; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.cat th { font-size: 10px; color: #99a; font-weight: 600; text-align: left;
          padding: 3px 8px; border-bottom: 1px solid #e6e9ee; }
.cat td { padding: 7px 8px; border-bottom: 1px solid #f0f2f5; vertical-align: middle;
          overflow-wrap: anywhere; }
.cat tr:last-child td { border-bottom: none; }
.n { text-align: right; white-space: nowrap; }
.cat th.n, .cat td.n { width: 56px; }
.cat th.q, .qtycell { width: 104px; white-space: nowrap; text-align: center; }
.uwg { color: #8a93a0; cursor: help; }
.minus, .plus {
  width: 30px; height: 30px; line-height: 1; padding: 0; font-size: 19px;
  border: 1px solid #c4c9d0; background: #f4f6f8; border-radius: 7px; cursor: pointer;
  vertical-align: middle; touch-action: manipulation;
}
.minus:active, .plus:active { background: #d6dade; }
.qv { display: inline-block; min-width: 26px; text-align: center; font-weight: 700;
      font-variant-numeric: tabular-nums; }
.row.off td { opacity: .4; }
.row.off .qtycell { opacity: 1; }
.powod { color: #b4451f; font-size: 11px; }

#excl-wrap { margin-top: 6px; }
#excl-wrap.hidden { display: none; }
.exhdr { font-size: 15px; font-weight: 700; margin: 6px 0 8px; }
.exnote { color: #777; font-size: 12px; margin: 0 0 10px; }

#bar {
  position: fixed; left: 0; right: 0; bottom: 0; background: #1b1e24; color: #fff;
  font-size: 15px; font-weight: 700; padding: 12px 16px; text-align: right;
  box-shadow: 0 -2px 10px rgba(0,0,0,.25); z-index: 9;
}
#bar .grandval { color: #6fe3a3; }

.empty { color: #889; padding: 24px 4px; text-align: center; }

dialog { border: none; border-radius: 10px; padding: 16px; max-width: 92vw; width: 560px; }
dialog h3 { margin: 0 0 6px; font-size: 15px; }
.small { font-size: 12px; color: #667; margin: 0 0 8px; }
#exportTxt { width: 100%; font: 12px/1.4 monospace; border: 1px solid #c4c9d0;
             border-radius: 7px; padding: 8px; }
.dlgbtns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }

@media print {
  #controls, #bar, .btn { display: none !important; }
  body { margin: 0; background: #fff; font-size: 10px; }
  #app { padding: 0; }
  .cats { column-count: 2; column-gap: 8mm; }
  .minus, .plus { display: none; }
  .qv { min-width: 0; }
  .cat { border: none; }
  #excl-wrap.hidden { display: block; }
}
</style>
</head>
<body>
<header>
  <h1>🎒 Pakowanie</h1>
  <div id=meta class=meta></div>
</header>

<section id=controls>
  <div class=ctlrow>
    <label class=fld>Wyjazd (preset)
      <select id=trip></select>
    </label>
    <label class=fld>Pasmo wysokości
      <select id=pasmo></select>
    </label>
    <label class=fld>Śnieg / mróz
      <select id=snieg>
        <option value=dowolnie>dowolnie</option>
        <option value=tak>tak</option>
        <option value=nie>nie</option>
      </select>
    </label>
  </div>
  <div class=tagswrap>
    <div class=lbl>Aktywności</div>
    <div id=tags class=tags></div>
  </div>
  <div class=ctlrow>
    <input id=search type=search placeholder="🔍 Szukaj rzeczy…">
    <button id=toggleEx type=button class=btn>Pokaż odfiltrowane</button>
    <button id=printBtn type=button class=btn>🖨 Drukuj / PDF</button>
    <button id=resetBtn type=button class=btn>↺ Reset ilości</button>
    <button id=exportBtn type=button class=btn>⬇ Eksport YAML</button>
  </div>
  <div id=celinfo class=celinfo></div>
</section>

<main id=app></main>

<div id=bar>Σ RAZEM: <span class=grandval>0</span> · <span class=gcountval>0</span> szt</div>

<dialog id=exportDlg>
  <h3>Wklej do <code>wyjazdy.yaml</code> (pod wybranym wyjazdem)</h3>
  <p class=small>Twoje zmiany ilości względem domyślnych: 0 → <code>usun</code>,
     inna liczba → <code>ilosc</code>, rzeczy dodane spoza listy → <code>dodaj</code>.</p>
  <textarea id=exportTxt rows=14 readonly></textarea>
  <div class=dlgbtns>
    <button id=copyBtn type=button class=btn>Kopiuj</button>
    <button id=exportClose type=button class=btn>Zamknij</button>
  </div>
</dialog>

<script>// Kalkulator pakowania — statyczna aplikacja (GitHub Pages).
// Źródło danych: data.json (generowane z YAML przez `python generate.py app`).
"use strict";

let DATA = null;
const STATE = {
  tripId: "",            // "" = filtrowanie ręczne
  pasmo: "do_3000",
  snieg: "dowolnie",     // dowolnie | tak | nie
  tags: new Set(),
  q: "",                 // szukajka
  showExcluded: false,
  qty: {},               // nadpisania ilości: nazwa -> liczba
};

const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
const esc = (s) => String(s).replace(/[&<>"]/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const fmt = (g) => !g ? "—" : (g >= 1000 ? (g / 1000).toFixed(2) + " kg" : g + " g");
const rank = (p) => (DATA.pasmo_rank[p] != null ? DATA.pasmo_rank[p] : 0);

// ---------- inicjalizacja ----------
if (window.PAKDATA) {                       // tryb standalone (dane wbudowane)
  DATA = window.PAKDATA; init();
} else {                                    // tryb Pages (data.json obok)
  fetch("data.json").then(r => r.json()).then(d => { DATA = d; init(); })
    .catch(e => { $("#app").innerHTML = "<p class=empty>Nie udało się wczytać data.json (" + e + ")</p>"; });
}

function init() {
  $("#meta").textContent =
    `baza: ${DATA.items.length} rzeczy · ${DATA.wyjazdy.length} wyjazdów · zaktualizowano ${DATA.generated}`;

  // presety wyjazdów
  const trip = $("#trip");
  trip.innerHTML = "<option value=''>— filtruj ręcznie —</option>" +
    DATA.wyjazdy.map(w => `<option value="${esc(w.id)}">${esc(w.nazwa)}</option>`).join("");

  // pasma (wg rangi rosnąco), pomijając alias
  const pas = Object.keys(DATA.pasmo_rank)
    .filter(k => k !== "powyzej_5000")
    .sort((a, b) => DATA.pasmo_rank[a] - DATA.pasmo_rank[b]);
  $("#pasmo").innerHTML = pas.map(p =>
    `<option value="${p}">${p}</option>`).join("");
  $("#pasmo").value = STATE.pasmo;

  // chipy aktywności
  const tg = DATA.tagi_aktywnosci;
  $("#tags").innerHTML = Object.keys(tg).map(t =>
    `<span class=chip data-tag="${t}" title="${esc(tg[t])}">${t}</span>`).join("");

  // zdarzenia
  trip.onchange = () => applyTrip(trip.value);
  $("#pasmo").onchange = e => { STATE.pasmo = e.target.value; render(); };
  $("#snieg").onchange = e => { STATE.snieg = e.target.value; render(); };
  $("#search").oninput = e => { STATE.q = e.target.value.trim(); render(); };
  $("#tags").onclick = e => {
    const c = e.target.closest(".chip"); if (!c) return;
    const t = c.dataset.tag;
    STATE.tags.has(t) ? STATE.tags.delete(t) : STATE.tags.add(t);
    render();
  };
  $("#toggleEx").onclick = () => {
    STATE.showExcluded = !STATE.showExcluded;
    $("#excl-wrap").classList.toggle("hidden", !STATE.showExcluded);
    $("#toggleEx").textContent = STATE.showExcluded ? "Ukryj odfiltrowane" : "Pokaż odfiltrowane";
  };
  $("#printBtn").onclick = () => window.print();
  $("#resetBtn").onclick = () => { STATE.qty = {}; save(); render(); };
  $("#exportBtn").onclick = exportYaml;
  $("#copyBtn").onclick = () => { $("#exportTxt").select(); document.execCommand("copy"); };
  $("#exportClose").onclick = () => $("#exportDlg").close();
  $("#app").addEventListener("click", onStep);

  // domyślnie zaznacz trekking, żeby coś było widać
  STATE.tags.add("trekking");
  syncChips();
  render();
}

// ---------- preset wyjazdu ----------
function currentTrip() { return DATA.wyjazdy.find(w => w.id === STATE.tripId) || null; }

function applyTrip(id) {
  STATE.tripId = id;
  const t = currentTrip();
  if (t) {
    STATE.tags = new Set(t.tagi);
    STATE.pasmo = t.pasmo || "do_3000";
    STATE.snieg = t.snieg == null ? "dowolnie" : (t.snieg ? "tak" : "nie");
  }
  STATE.qty = load();   // wczytaj zapamiętane ilości dla tego wyjazdu
  $("#pasmo").value = STATE.pasmo;
  $("#snieg").value = STATE.snieg;
  syncChips();
  render();
}

function syncChips() {
  $$(".chip").forEach(c => c.classList.toggle("on", STATE.tags.has(c.dataset.tag)));
}

// ---------- localStorage ----------
const lsKey = () => "pak:" + (STATE.tripId || "custom");
function save() { try { localStorage.setItem(lsKey(), JSON.stringify(STATE.qty)); } catch (e) {} }
function load() { try { return JSON.parse(localStorage.getItem(lsKey())) || {}; } catch (e) { return {}; } }

// ---------- filtrowanie ----------
function matchTags(it) { return it.t.some(t => STATE.tags.has(t)); }
function inPasmo(it) { return rank(it.p) <= rank(STATE.pasmo); }
function snowOK(it) { return !(STATE.snieg === "nie" && it.s); }
function searchOK(it) { return !STATE.q || it.n.toLowerCase().includes(STATE.q.toLowerCase()); }

function defQty(it) {
  if (it._apt) return 1;
  const t = currentTrip();
  if (t && t.ilosc && (it.n in t.ilosc)) return t.ilosc[it.n];
  return it.q;
}
function qtyOf(it) { return (it.n in STATE.qty) ? STATE.qty[it.n] : defQty(it); }

function compute() {
  const t = currentTrip();
  const dodaj = new Set(t ? t.dodaj : []);
  const usun = new Set(t ? t.usun : []);
  const main = [], excl = [];
  DATA.items.forEach(it => {
    if (!searchOK(it)) return;
    const tagged = matchTags(it);
    const forced = dodaj.has(it.n);
    const removed = usun.has(it.n);
    const cand = forced || (tagged && inPasmo(it) && snowOK(it) && !removed);
    if (cand) { main.push(it); return; }
    if (tagged && searchOK(it)) {
      let r = removed ? "decyzja: nie bierzemy"
        : rank(it.p) > rank(STATE.pasmo) ? "pasmo " + it.p
        : (STATE.snieg === "nie" && it.s) ? "tylko przy śniegu" : null;
      if (r) excl.push(Object.assign({}, it, { _r: r }));
    }
  });
  if (t) {  // apteczki wyjazdu jako pozycje
    t.apteczki.forEach(code => {
      const a = DATA.apteczki[code];
      if (a) main.push({ n: a.n, k: "Apteczka", f: "Apteczka", p: "niskie", s: false, w: a.w, q: 1, t: [], _apt: true });
    });
  }
  return { main, excl };
}

function groupByFun(items) {
  const g = {};
  items.forEach(it => (g[it.f] = g[it.f] || []).push(it));
  return DATA.fun_order.filter(fn => g[fn])
    .map(fn => [fn, g[fn].sort((a, b) => (a.k + a.n).localeCompare(b.k + b.n, "pl"))]);
}

// ---------- render ----------
function rowHtml(it) {
  const u = it.w || 0, q = qtyOf(it);
  const ut = u ? u + " g" : "—";
  const uw = it.u ? ` <span class=uwg title="${esc(it.u)}">ⓘ</span>` : "";
  const pw = it._r ? ` <span class=powod>(${esc(it._r)})</span>` : "";
  return `<tr class="row${q === 0 ? " off" : ""}" data-name="${esc(it.n)}" data-w="${u}"${it._apt ? " data-apt=1" : ""}>
    <td>${esc(it.n)}${uw}${pw}</td>
    <td class=qtycell><button type=button class=minus>−</button>
      <span class=qv>${q}</span><button type=button class=plus>+</button></td>
    <td class=n>${ut}</td><td class="n rt">${fmt(u * q)}</td></tr>`;
}

function sectionsHtml(groups) {
  return groups.map(([fn, items]) =>
    `<section class="cat sec"><h3><span>${esc(fn)}</span><span class=sub>—</span></h3>
     <table><tr><th>Rzecz</th><th class=q>Ilość</th><th class=n>/szt</th><th class=n>Razem</th></tr>
     ${items.map(rowHtml).join("")}</table></section>`).join("");
}

function render() {
  syncChips();
  const t = currentTrip();
  $("#celinfo").innerHTML = t
    ? `<b>${esc(t.nazwa)}</b> · cel: ${esc(t.cel || "—")} · ${esc(t.uwagi || "").slice(0, 160)}`
    : (STATE.tags.size ? "" : "Wybierz aktywność (chipy) lub preset wyjazdu.");

  const { main, excl } = compute();
  const app = $("#app");
  if (!main.length && !excl.length) {
    app.innerHTML = "<p class=empty>Brak rzeczy dla tych filtrów. Zaznacz aktywność lub poszerz pasmo.</p>";
    recompute(); return;
  }
  let html = `<div class=cats id=main-sections>${sectionsHtml(groupByFun(main))}</div>`;
  html += `<div id=excl-wrap class="${STATE.showExcluded ? "" : "hidden"}">
    <div class=exhdr>➕ Odfiltrowane (${excl.length}) — ustaw ilość &gt; 0, by dodać</div>
    <div class=exnote>Pasują do aktywności, ale ucięte przez pasmo/śnieg lub świadomie pominięte.</div>
    <div class=cats id=excl-sections>${sectionsHtml(groupByFun(excl))}</div></div>`;
  app.innerHTML = html;
  recompute();
}

function onStep(e) {
  const b = e.target;
  if (!b.classList.contains("plus") && !b.classList.contains("minus")) return;
  const row = b.closest(".row"), name = row.dataset.name;
  let q = parseInt(row.querySelector(".qv").textContent, 10) || 0;
  q += b.classList.contains("plus") ? 1 : -1; if (q < 0) q = 0;
  row.querySelector(".qv").textContent = q;
  STATE.qty[name] = q; save(); recompute();
}

function recompute() {
  let grand = 0, gc = 0;
  $$("#app .sec").forEach(sec => {
    let s = 0, c = 0;
    $$(".row", sec).forEach(r => {
      const q = parseInt(r.querySelector(".qv").textContent, 10) || 0;
      const w = +r.dataset.w || 0, tot = q * w;
      r.querySelector(".rt").textContent = fmt(tot);
      r.classList.toggle("off", q === 0);
      s += tot; c += q;
    });
    const sub = sec.querySelector(".sub"); if (sub) sub.textContent = fmt(s) + " · " + c + " szt";
    grand += s; gc += c;
  });
  $$(".grandval").forEach(e => e.textContent = (grand / 1000).toFixed(2) + " kg");
  $$(".gcountval").forEach(e => e.textContent = gc);
}

// ---------- eksport do YAML (usun / dodaj / ilosc) ----------
function exportYaml() {
  const usun = [], dodaj = [], ilosc = [];
  $$("#main-sections .row").forEach(r => {
    if (r.dataset.apt === "1") return;
    const name = r.dataset.name;
    const q = parseInt(r.querySelector(".qv").textContent, 10) || 0;
    const def = defQtyByName(name);
    if (q === 0) usun.push(name);
    else if (q !== def) ilosc.push([name, q]);
  });
  $$("#excl-sections .row").forEach(r => {
    const name = r.dataset.name;
    const q = parseInt(r.querySelector(".qv").textContent, 10) || 0;
    if (q > 0) { dodaj.push(name); if (q !== 1) ilosc.push([name, q]); }
  });
  const Q = (s) => JSON.stringify(s);
  let out = [];
  if (dodaj.length) out.push("  dodaj: [" + dodaj.map(Q).join(", ") + "]");
  if (usun.length) out.push("  usun: [" + usun.map(Q).join(", ") + "]");
  if (ilosc.length) {
    out.push("  ilosc:");
    ilosc.forEach(([n, q]) => out.push("    " + Q(n) + ": " + q));
  }
  $("#exportTxt").value = out.length
    ? out.join("\n")
    : "# Brak zmian względem domyślnych ilości.";
  $("#exportDlg").showModal();
}
function defQtyByName(name) {
  const it = DATA.items.find(x => x.n === name);
  return it ? defQty(it) : 1;
}
</script>
